{% load static %}

<nav class="w-full bg-gradient-to-r from-[#0b2f63] to-[#0f3d85] fixed top-0 z-50">
  <div class="max-w-[1200px] mx-auto px-6 h-16 grid grid-cols-3 items-center text-white">

    <!-- LOGO -->
    <div class="flex items-center gap-3">
      <img
        src="{% static 'img/logo_arib.png' %}"
        alt="IESTP ARIB"
        class="h-12"
      />
      <span class="font-semibold text-sm hidden sm:block">

      </span>
    </div>

    <!-- MENÚ CENTRADO -->
    <ul class="hidden md:flex justify-center items-center gap-6 text-sm font-medium">
      <li>
        <a href="#inicio"
           class="nav-link">Inicio</a>
      </li>
      <li>
        <a href="#requisitos"
           class="nav-link">Requisitos</a>
      </li>
      <li>
        <a href="#cronograma"
           class="nav-link">Cronograma</a>
      </li>
      <li>
        <a href="#contacto"
           class="nav-link">Contacto</a>
      </li>
    </ul>

    <!-- DERECHA: LOGIN / CTA -->
    <div class="flex justify-end items-center gap-4 text-sm">

      {% if request.user.is_authenticated %}
        <span class="hidden sm:inline text-slate-200">
          {{ request.user.email }}
        </span>
        <a href="{% url 'usuarios:cerrar_sesion' %}"
           class="hover:text-red-300">
          Salir
        </a>
      {% else %}
        <a href="{% url 'usuarios:iniciar_sesion' %}"
           class="hover:text-yellow-300">
          Iniciar sesión
        </a>
      {% endif %}

      <a href="{% url 'postulantes:registrar_inscripcion' %}"
         class="bg-yellow-400 text-blue-900 font-bold px-4 py-2 rounded-full shadow hover:bg-yellow-300 transition">
        POSTULA AHORA
      </a>
    </div>

  </div>
</nav>
